spring.application.name=Mzalendo POS
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3307/mzalendo_schema}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

app.jwt.secret=${JWT_SECRET:3d7f2a9b1c4e6f8a0d2b4c6e8f1a3b5d7e9f2a4b6c8d0e2f4a6b8c0d2e4f6a8b}
app.jwt.expiration=86400000

# ─── EFRIS URA Integration ────────────────────────────────────────────────────
# Set efris.enabled=true and supply real credentials to activate.
# Obtain device credentials from URA after registering a VSCU/OSCU device.
efris.enabled=${EFRIS_ENABLED:false}
efris.sandbox=${EFRIS_SANDBOX:true}
efris.api-url=https://efrisws.ura.go.ug/api/efrisws/ws/taInvoiceRequestLocal
efris.sandbox-url=https://efrisws.ura.go.ug/sandbox/efrisws/ws/taInvoiceRequestLocal
efris.tin=${EFRIS_TIN:}
efris.device-no=${EFRIS_DEVICE_NO:}
efris.device-mac=${EFRIS_DEVICE_MAC:}
efris.private-key=${EFRIS_PRIVATE_KEY:}
efris.legal-name=${EFRIS_LEGAL_NAME:}
efris.business-name=${EFRIS_BUSINESS_NAME:}
efris.address=${EFRIS_ADDRESS:}
efris.mobile-phone=${EFRIS_MOBILE_PHONE:}
efris.place-of-business=${EFRIS_PLACE_OF_BUSINESS:Kampala}
efris.longitude=${EFRIS_LONGITUDE:32.5825}
efris.latitude=${EFRIS_LATITUDE:0.3476}
efris.industry-code=${EFRIS_INDUSTRY_CODE:101}
efris.max-retry-attempts=3
efris.retry-interval-ms=300000
efris.timeout-ms=10000
