# â”€â”€â”€ EFRIS URA Integration â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Set efris.enabled=true and supply real credentials to activate.
# Obtain device credentials from URA after registering a VSCU/OSCU device.
efris.enabled=${EFRIS_ENABLED:false}
efris.sandbox=${EFRIS_SANDBOX:true}
efris.api-url=https://efrisws.ura.go.ug/api/efrisws/ws/taInvoiceRequestLocal
efris.sandbox-url=https://efrisws.ura.go.ug/sandbox/efrisws/ws/taInvoiceRequestLocal
efris.tin=${EFRIS_TIN:}
efris.device-no=${EFRIS_DEVICE_NO:}
efris.device-mac=${EFRIS_DEVICE_MAC:}
efris.private-key=${EFRIS_PRIVATE_KEY:}
efris.legal-name=${EFRIS_LEGAL_NAME:}
efris.business-name=${EFRIS_BUSINESS_NAME:}
efris.address=${EFRIS_ADDRESS:}
efris.mobile-phone=${EFRIS_MOBILE_PHONE:}
efris.place-of-business=${EFRIS_PLACE_OF_BUSINESS:Kampala}
efris.longitude=${EFRIS_LONGITUDE:32.5825}
efris.latitude=${EFRIS_LATITUDE:0.3476}
efris.industry-code=${EFRIS_INDUSTRY_CODE:101}
efris.max-retry-attempts=3
efris.retry-interval-ms=300000
efris.timeout-ms=10000

# â”€â”€â”€ Accounting Tool Integrations â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Each provider is disabled by default. Enable individually with the flags below.
# Register OAuth2 apps at:
#   QuickBooks: https://developer.intuit.com
#   Xero:       https://developer.xero.com
#   Zoho Books: https://api-console.zoho.com
#
# Redirect URIs must be registered in each provider's developer console, e.g.:
#   https://yourpos.com/api/v1/accounting/QUICKBOOKS/callback
#   https://yourpos.com/api/v1/accounting/XERO/callback
#   https://yourpos.com/api/v1/accounting/ZOHO_BOOKS/callback

# QuickBooks Online
accounting.quickbooks.enabled=${QB_ENABLED:false}
accounting.quickbooks.sandbox=${QB_SANDBOX:true}
accounting.quickbooks.client-id=${QB_CLIENT_ID:}
accounting.quickbooks.client-secret=${QB_CLIENT_SECRET:}
accounting.quickbooks.redirect-uri=${QB_REDIRECT_URI:}
accounting.quickbooks.income-account-name=${QB_INCOME_ACCOUNT:Sales of Product Income}

# Xero
accounting.xero.enabled=${XERO_ENABLED:false}
accounting.xero.client-id=${XERO_CLIENT_ID:}
accounting.xero.client-secret=${XERO_CLIENT_SECRET:}
accounting.xero.redirect-uri=${XERO_REDIRECT_URI:}
accounting.xero.revenue-account-code=${XERO_REVENUE_ACCOUNT:200}
accounting.xero.tax-account-code=${XERO_TAX_ACCOUNT:OUTPUT}

# Zoho Books
accounting.zoho.enabled=${ZOHO_ENABLED:false}
accounting.zoho.client-id=${ZOHO_CLIENT_ID:}
accounting.zoho.client-secret=${ZOHO_CLIENT_SECRET:}
accounting.zoho.redirect-uri=${ZOHO_REDIRECT_URI:}
accounting.zoho.region=${ZOHO_REGION:com}

# Retry settings (applies to all accounting providers)
accounting.max-retry-attempts=3
accounting.retry-interval-ms=300000
